<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot Cockpit — GitHub Copilot Interactive Reference</title>
    <meta name="description" content="Interactive HUD-style reference for all GitHub Copilot features. Explore instruments, diagrams, code examples, and more.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Prism.js — Syntax Highlighting (Tomorrow Night theme for HUD aesthetic) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js" defer></script>

    <!-- Mermaid (loaded async, rendered on demand) -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" defer></script>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header class="cockpit-header">
        <div class="cockpit-title">
            <span class="icon">✈</span>
            <div>
                <h1>Copilot Cockpit</h1>
                <div class="subtitle">GitHub Copilot Interactive Reference</div>
            </div>
        </div>
        <div class="header-right">
            <nav class="header-nav" aria-label="Perspectives">
                <a href="#" class="nav-link disabled" aria-disabled="true" title="Coming soon">Terminal<span class="nav-soon">SOON</span></a>
                <a href="security.html" class="nav-link">Security</a>
                <a href="#" class="nav-link disabled" aria-disabled="true" title="Coming soon">Gangway<span class="nav-soon">SOON</span></a>
                <a href="index.html" class="nav-link active">Cockpit</a>
                <a href="#" class="nav-link disabled" aria-disabled="true" title="Coming soon">Tower<span class="nav-soon">SOON</span></a>
                <span class="nav-separator">·</span>
                <a href="flight-log.html" class="nav-link">Flight Log</a>
            </nav>
            <div class="search-container">
                <span class="search-icon">⌕</span>
                <input type="text" id="search-input" class="search-input"
                       placeholder="Search instruments… (/ or Ctrl+K)"
                       aria-label="Search instruments">
            </div>
            <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">DAY</button>
            <div class="header-status">
                <span class="dot"></span>
                <span id="visible-count"></span>
                <span>SYS ONLINE</span>
                <span style="margin-left:8px;opacity:0.5" id="last-updated"></span>
            </div>
        </div>
    </header>

    <!-- ==================== FILTER BAR ==================== -->
    <div class="filter-bar">
        <span class="filter-label">Flight Mode</span>
        <button class="filter-btn" data-filter-type="flightMode" data-filter-value="beginner">VFR · Beginner</button>
        <button class="filter-btn" data-filter-type="flightMode" data-filter-value="advanced">IFR · Advanced</button>
        <button class="filter-btn" data-filter-type="flightMode" data-filter-value="atc">ATC · Admin</button>

        <span class="filter-label" style="margin-left:16px">Plan</span>
        <button class="filter-btn" data-filter-type="plan" data-filter-value="free">Free</button>
        <button class="filter-btn" data-filter-type="plan" data-filter-value="pro">Pro</button>
        <button class="filter-btn" data-filter-type="plan" data-filter-value="business">Business</button>
        <button class="filter-btn" data-filter-type="plan" data-filter-value="enterprise">Enterprise</button>

        <span class="filter-label" style="margin-left:16px">Status</span>
        <button class="filter-btn" data-filter-type="status" data-filter-value="ga">GA</button>
        <button class="filter-btn" data-filter-type="status" data-filter-value="preview">Preview</button>
    </div>

    <!-- ==================== BLADE LAYOUT ==================== -->
    <div id="cockpit-body" class="cockpit-body">

        <!-- Main content area (shrinks when blade opens) -->
        <div class="cockpit-main" id="cockpit-main">
            <main id="cockpit-grid" class="cockpit-grid">
                <!-- Rendered by app.js from data/copilot-instruments.json -->
            </main>
            <footer id="cockpit-legend" class="cockpit-legend">
                <!-- Rendered by app.js -->
            </footer>
        </div>

        <!-- Detail blade (slides in from right) -->
        <aside id="detail-panel" class="detail-blade">
            <!-- Populated dynamically by openDetailPanel() -->
        </aside>

    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
