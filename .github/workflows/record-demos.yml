name: Record Terminal Demos

on:
  push:
    paths:
      - 'media/scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install asciinema
        run: pip install asciinema

      - name: Install agg
        run: |
          curl -sL https://github.com/asciinema/agg/releases/latest/download/agg-x86_64-unknown-linux-gnu -o /usr/local/bin/agg
          chmod +x /usr/local/bin/agg

      - name: Record all demos
        run: ./tools/record-demo.sh --all

      - name: Check GIF sizes
        run: |
          echo "## Recording sizes" >> $GITHUB_STEP_SUMMARY
          for gif in media/recordings/*.gif; do
            size=$(du -h "$gif" | cut -f1)
            echo "- $(basename "$gif"): $size" >> $GITHUB_STEP_SUMMARY
          done

      - name: Commit updated recordings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add media/recordings/
          if git diff --cached --quiet; then
            echo "No recording changes to commit"
          else
            git commit -m "Update terminal recordings [automated]"
            git push
          fi
